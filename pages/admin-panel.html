<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - UniMart</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="/js/firebase-config.js"></script>
    <script src="/js/firebase-auth.js"></script>
    <script src="/js/auth-guard.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-placeholder">
                    <img src="/assets/sidebar-logo.png" alt="UniMart logo" class="logo-image">
                </div>
                <h1>UNIMART</h1>
            </div>

            <nav class="navigation">
                <h3>NAVIGATION</h3>
                <ul>
                    <li>
                        <a href="/" class="nav-item">
                            <i class="fas fa-store"></i>
                            <span>Marketplace</span>
                        </a>
                    </li>
                    <li>
                        <a href="/pages/sell-item" class="nav-item">
                            <i class="fas fa-plus"></i>
                            <span>Sell Item</span>
                        </a>
                    </li>
                    <li>
                        <a href="/pages/my-sales" class="nav-item">
                            <i class="fas fa-chart-line"></i>
                            <span>My Sales</span>
                        </a>
                    </li>
                    <li>
                        <a href="/pages/my-favorites" class="nav-item">
                            <i class="fas fa-heart"></i>
                            <span>My Favorites</span>
                        </a>
                    </li>
                    <li>
                        <a href="profile" class="nav-item">
                            <i class="fas fa-user"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                    <li>
                        <a href="user-guide" class="nav-item">
                            <i class="fas fa-book-open"></i>
                            <span>User Guide</span>
                        </a>
                    </li>
                    <li data-admin-nav-item="true">
                        <a href="admin-panel" class="nav-item active">
                            <i class="fas fa-user-shield"></i>
                            <span>Admin Panel</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div id="userSection">
                <div class="user-profile" id="userProfile" style="display: none;">
                    <div class="user-avatar">
                        <img id="userProfileImage" src="" alt="Profile" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
                        <i class="fas fa-user-circle" id="userAvatarIcon"></i>
                    </div>
                    <div class="user-info">
                        <h4 id="userName">User Name</h4>
                        <p id="userEmail">user@email.com</p>
                    </div>
                    <button class="btn-logout" onclick="handleSignOut()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Sign Out</span>
                    </button>
                </div>

                <button class="btn-login" id="loginBtn" onclick="window.location.href='/pages/login'">
                    <i class="fab fa-google"></i>
                    <span>Sign in with Google</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="orders-header">
                <div class="orders-header-content">
                    <h1>Admin Panel</h1>
                    <p>Manage all marketplace listings and admin access</p>
                </div>
                <div class="sales-stats">
                    <div class="stat-box">
                        <div class="stat-number" id="adminTotalListings">0</div>
                        <div class="stat-label">Total Listings</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="adminActiveListings">0</div>
                        <div class="stat-label">Active Listings</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="adminSoldListings">0</div>
                        <div class="stat-label">Sold Listings</div>
                    </div>
                </div>
            </div>

            <div class="sales-filter-bar">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="sold">Sold</button>
                    <button class="filter-btn" data-filter="withdrawn">Withdrawn</button>
                </div>
            </div>

            <div id="adminSalesStatusBanner" class="marketplace-warning-banner" style="display:none;"></div>

            <div class="sales-section">
                <div class="products-grid my-sales-grid" id="adminSalesGrid"></div>
            </div>

            <section class="admin-access-section">
                <div class="admin-access-container">
                    <h3>Admin Access</h3>
                    <div class="admin-access-row">
                        <input type="email" id="newAdminEmail" placeholder="Add admin email (e.g. student@example.com)">
                        <button type="button" id="addAdminEmailBtn">Add Admin</button>
                    </div>
                    <ul id="adminEmailList" class="admin-email-list"></ul>
                </div>
            </section>
        </main>

    </div>

    <script src="/js/user-sidebar.js"></script>
    <script type="module" src="/admin/AdminPage.js"></script>
</body>
</html>
